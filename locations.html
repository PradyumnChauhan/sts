<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location History - Study Buddy</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #262626 100%);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.2rem; margin-bottom: 10px; }
        .header p { color: #aaa; font-size: 1rem; }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #444 0%, #333 100%);
            color: #fff;
            border: 1px solid #555;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #555 0%, #444 100%); }
        .btn-danger {
            background: linear-gradient(135deg, #8b0000 0%, #6b0000 100%);
            color: #fff;
        }
        .btn-danger:hover { background: linear-gradient(135deg, #a00000 0%, #8b0000 100%); }
        .locations-grid {
            display: grid;
            gap: 15px;
        }
        .location-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #262626 100%);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }
        .location-card:hover { border-color: #555; background: linear-gradient(135deg, #262626 0%, #333 100%); }
        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .device-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }
        .timestamp {
            font-size: 0.85rem;
            color: #888;
        }
        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .location-item {
            background: #262626;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .location-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .location-value {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .map-link {
            display: inline-block;
            margin-top: 15px;
        }
        .map-link a {
            color: #00d9ff;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 1px solid #00d9ff;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .map-link a:hover {
            background: #00d9ff;
            color: #000;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 60px 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #262626 100%);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: 700; color: #00d9ff; }
        .stat-label { color: #aaa; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 Location History</h1>
            <p>Real-time GPS coordinates from connected devices</p>
            <div class="controls">
                <a href="/" class="btn btn-primary">← Back to Dashboard</a>
                <button class="btn btn-danger" onclick="clearLocations()">🗑️ Clear All Locations</button>
                <button class="btn btn-primary" onclick="loadLocations()">🔄 Refresh</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalLocations">0</div>
                <div class="stat-label">📍 Total Locations</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueDevices">0</div>
                <div class="stat-label">📱 Unique Devices</div>
            </div>
        </div>

        <div id="locationsContainer" class="locations-grid">
            <div class="empty">Loading location data...</div>
        </div>
    </div>

    <script>
        const socket = io();
        let allLocations = [];

        // Load locations on page load
        loadLocations();

        // Refresh locations every 5 seconds
        setInterval(loadLocations, 5000);

        // Listen for new location data via socket
        socket.on('location-data', (data) => {
            console.log('📍 New location received:', data);
            loadLocations();
        });

        async function loadLocations() {
            try {
                const response = await fetch('/api/locations');
                const data = await response.json();
                allLocations = data.locations || [];
                displayLocations();
            } catch (error) {
                console.error('Error loading locations:', error);
            }
        }

        function displayLocations() {
            const container = document.getElementById('locationsContainer');
            const totalLocations = document.getElementById('totalLocations');
            const uniqueDevices = document.getElementById('uniqueDevices');

            totalLocations.textContent = allLocations.length;

            // Count unique devices
            const devices = new Set(allLocations.map(l => l.deviceId || 'unknown'));
            uniqueDevices.textContent = devices.size;

            if (allLocations.length === 0) {
                container.innerHTML = '<div class="empty">No location data yet. Waiting for device locations...</div>';
                return;
            }

            // Sort by receivedAt descending (newest first)
            const sorted = [...allLocations].sort((a, b) => {
                const timeA = new Date(a.receivedAt).getTime();
                const timeB = new Date(b.receivedAt).getTime();
                return timeB - timeA;
            });

            container.innerHTML = sorted.map(location => {
                const receivedTime = new Date(location.receivedAt).toLocaleString();
                const latitude = typeof location.latitude === 'number' ? location.latitude.toFixed(6) : location.latitude;
                const longitude = typeof location.longitude === 'number' ? location.longitude.toFixed(6) : location.longitude;
                const accuracy = location.accuracy ? `${location.accuracy}m` : 'N/A';
                const provider = location.provider || 'Unknown';
                const deviceName = location.deviceName || 'Unknown Device';

                return `
                    <div class="location-card">
                        <div class="location-header">
                            <div class="device-name">📱 ${deviceName}</div>
                            <div class="timestamp">${receivedTime}</div>
                        </div>
                        <div class="location-grid">
                            <div class="location-item">
                                <div class="location-label">Latitude</div>
                                <div class="location-value">${latitude}</div>
                            </div>
                            <div class="location-item">
                                <div class="location-label">Longitude</div>
                                <div class="location-value">${longitude}</div>
                            </div>
                            <div class="location-item">
                                <div class="location-label">Accuracy</div>
                                <div class="location-value">${accuracy}</div>
                            </div>
                            <div class="location-item">
                                <div class="location-label">Provider</div>
                                <div class="location-value">${provider}</div>
                            </div>
                        </div>
                        <div class="map-link">
                            <a href="https://maps.google.com/?q=${latitude},${longitude}" target="_blank">
                                🗺️ View on Google Maps
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function clearLocations() {
            if (!confirm('Are you sure you want to clear all location data?')) {
                return;
            }

            try {
                await fetch('/api/locations/clear', { method: 'POST' });
                allLocations = [];
                displayLocations();
                alert('✅ All location data cleared');
            } catch (error) {
                console.error('Error clearing locations:', error);
                alert('❌ Error clearing locations');
            }
        }
    </script>
</body>
</html>
